<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Data Integrity Platform</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/settings.css">
</head>
<body>
    <header>
        <h1>Settings</h1>
    </header>
    <main>
        <section>
            <h2>Application Settings</h2>
            <form id="settings-form">
                <label for="data-refresh-interval">Data Refresh Interval (minutes):</label>
                <input type="number" id="data-refresh-interval" name="data-refresh-interval" min="1" required>
                
                <label for="notification-preferences">Notification Preferences:</label>
                <select id="notification-preferences" name="notification-preferences">
                    <option value="email">Email</option>
                    <option value="sms">SMS</option>
                    <option value="none">None</option>
                </select>
                
                <button type="submit">Save Settings</button>
            </form>
        </section>
    </main>
    <script src="../js/app.js"></script>
    <script src="../js/pages/settings.js"></script>
</body>
</html>
